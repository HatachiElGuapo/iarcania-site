<script>
(function(){
  const c=document.getElementById('rain'), ctx=c.getContext('2d'); let drops=[];
  function init(){
    c.width=innerWidth; c.height=innerHeight;
    drops=Array.from({length:Math.floor(innerWidth/14)},()=>({
      x:Math.random()*innerWidth, y:Math.random()*innerHeight,
      speed:1+Math.random()*1.8, len:14+Math.random()*24,
      op:0.04+Math.random()*0.09, w:0.4+Math.random()*0.6,
    }));
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    drops.forEach(d=>{
      ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(d.x-0.6,d.y+d.len);
      ctx.strokeStyle=`rgba(172,138,255,${d.op})`; ctx.lineWidth=d.w; ctx.stroke();
      d.y+=d.speed; if(d.y>c.height){d.y=-d.len;d.x=Math.random()*c.width;}
    });
    requestAnimationFrame(draw);
  }
  addEventListener('resize',init); init(); draw();
})();
</script>

function useMobile(){
  const [mob,setMob]=useState(()=>window.innerWidth<768);
  useEffect(()=>{
    const fn=()=>setMob(window.innerWidth<768);
    window.addEventListener('resize',fn,{passive:true});
    return()=>window.removeEventListener('resize',fn);
  },[]);

}

/* ─── Relative date helper ─── */
function relativeDate(dateStr){
  if(!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00'); d.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if(diff === 0)  return { label:'Hoy',    color:'#4ade80' };
  if(diff === 1)  return { label:'Mañana', color:'#60a5fa' };
  if(diff === -1) return { label:'Ayer',   color:'#f87171' };
  if(diff > 1 && diff <= 7) return { label:`En ${diff} días`, color:'#c9a84c' };
  if(diff < -1)  return { label:`Hace ${Math.abs(diff)}d`, color:'#7a788f' };
  const mes=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return { label:`${d.getDate()} ${mes[d.getMonth()]}`, color:'#7a788f' };
}

/* ─── fmtSec ─── */
function fmtSec(s){
  const m=Math.floor(s/60), sec=s%60;
  return m>0 ? `${m}m ${sec>0?sec+'s':''}`.trim() : `${sec}s`;
}

const DEFAULT_SECTIONS = [
  {id:1,nombre:'Intro / Hook',duracion:30,texto:''},
  {id:2,nombre:'Desarrollo principal',duracion:180,texto:''},
  {id:3,nombre:'Ejemplos / Demo',duracion:120,texto:''},
  {id:4,nombre:'CTA & Cierre',duracion:30,texto:''},
];

/* ═══════════════════════════════════════════════
   TELEPROMPTER MODAL
═══════════════════════════════════════════════ */
function TeleprompterModal({secs, onClose}){
  const [speed,setSpeed]=useState(40);
  const [running,setRunning]=useState(false);
  const containerRef=useRef(null);
  const frameRef=useRef(null);
  const posRef=useRef(0);

  const fullText=secs.filter(s=>s.texto&&s.texto.trim()).map(s=>`[${s.nombre}]\n\n${s.texto}`).join('\n\n──────────────────────────\n\n');

  useEffect(()=>{
    if(!running){cancelAnimationFrame(frameRef.current);return;}
    let last=null;
    function step(ts){
      if(last===null)last=ts;
      const dt=(ts-last)/1000;
      last=ts;
      posRef.current+=speed*dt;
      if(containerRef.current){
        containerRef.current.scrollTop=posRef.current;
        if(containerRef.current.scrollTop>=containerRef.current.scrollHeight-containerRef.current.clientHeight-2){
          setRunning(false);return;
        }
      }
      frameRef.current=requestAnimationFrame(step);
    }
    frameRef.current=requestAnimationFrame(step);
    return()=>cancelAnimationFrame(frameRef.current);
  },[running,speed]);

  return(
    <div style={{position:'fixed',inset:0,background:'#000',zIndex:9999,display:'flex',flexDirection:'column'}}>
      <div style={{height:60,display:'flex',alignItems:'center',gap:12,padding:'0 16px',borderBottom:'1px solid rgba(255,255,255,0.08)',flexShrink:0,flexWrap:'wrap'}}>
        <button onClick={()=>setRunning(r=>!r)} style={{minWidth:100,minHeight:44,padding:'0 16px',borderRadius:10,background:running?'rgba(248,113,113,0.15)':'rgba(74,222,128,0.15)',border:`1px solid ${running?'rgba(248,113,113,0.4)':'rgba(74,222,128,0.4)'}`,color:running?'#f87171':'#4ade80',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>
          {running?'⏸ Pausar':'▶ Iniciar'}
        </button>
        <div style={{display:'flex',alignItems:'center',gap:8,flex:1,maxWidth:260}}>
          <span style={{fontSize:12,color:'rgba(255,255,255,0.35)',whiteSpace:'nowrap'}}>Vel.</span>
          <input type="range" min="5" max="120" step="5" value={speed} onChange={e=>setSpeed(Number(e.target.value))} style={{flex:1}}/>
          <span style={{fontSize:12,color:'rgba(255,255,255,0.35)',minWidth:24}}>{speed}</span>
        </div>
        <button onClick={()=>{posRef.current=0;if(containerRef.current)containerRef.current.scrollTop=0;setRunning(false);}}
          style={{minHeight:44,padding:'0 14px',borderRadius:8,background:'transparent',border:'1px solid rgba(255,255,255,0.12)',color:'rgba(255,255,255,0.4)',fontSize:12,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>↺</button>
        <button onClick={onClose} style={{minWidth:44,minHeight:44,marginLeft:'auto',borderRadius:8,background:'transparent',border:'1px solid rgba(255,255,255,0.12)',color:'rgba(255,255,255,0.5)',fontSize:16,cursor:'pointer'}}>✕</button>
      </div>
      <div ref={containerRef} style={{flex:1,overflowY:'auto',padding:'60px 20px 200px'}}
        onScroll={e=>{if(!running)posRef.current=e.currentTarget.scrollTop;}}>
        <div style={{maxWidth:680,margin:'0 auto',fontSize:clamp(22,3.5,32),lineHeight:1.95,color:'#f0eeff',fontFamily:'Inter,sans-serif',whiteSpace:'pre-wrap',letterSpacing:0.2}}>
          {fullText||<span style={{color:'rgba(255,255,255,0.3)'}}>No hay texto de guión aún.</span>}
        </div>
      </div>
    </div>
  );
}
function clamp(min,vw,max){return`clamp(${min}px,${vw}vw,${max}px)`;}

function ScriptEditor({item,onBack,onSave,isMobile}){
  const ch=CHANNELS[item.canal]||CHANNELS.iarcania;
  const [secs,setSecs]=useState(item.guion&&item.guion.length>0 ? item.guion : DEFAULT_SECTIONS.map(s=>({...s})));
  const [activeIdx,setActiveIdx]=useState(0);
  const [editingName,setEditingName]=useState(null);
  const [showTP,setShowTP]=useState(false);

  const totalSec=secs.reduce((a,s)=>a+(parseInt(s.duracion)||0),0);

  function updateSec(idx,key,val){setSecs(prev=>prev.map((s,i)=>i===idx?{...s,[key]:val}:s));}
  function addSection(){
    const ns={id:Date.now(),nombre:'Nueva sección',duracion:60,texto:''};
    setSecs(prev=>[...prev,ns]);
    setActiveIdx(secs.length);
  }
  function deleteSection(idx){
    setSecs(prev=>prev.filter((_,i)=>i!==idx));
    setActiveIdx(i=>Math.max(0,i-(idx<=i?1:0)));
  }
  function moveSection(idx,dir){
    setSecs(prev=>{
      const a=[...prev]; const b=idx+dir;
      if(b<0||b>=a.length)return a;
      [a[idx],a[b]]=[a[b],a[idx]]; return a;
    });
    setActiveIdx(i=>i===idx?i+dir:i===idx+dir?i-dir:i);
  }

  const active=secs[activeIdx>=0?activeIdx:0]||secs[0];
  const px=isMobile?12:28;

    <div style={{display:'flex',flexDirection:'column',height:'100%',animation:'fadeIn 0.3s ease'}}>

            onMouseLeave={e=>{e.currentTarget.style.color=T.muted;e.currentTarget.style.borderColor=T.border;}}>
            ← Volver
          </button>
          {!isMobile&&<><ChannelBadge channelId={item.canal}/>
            <span style={{color:T.dim,fontSize:13}}>·</span>
            <span style={{fontSize:12,fontWeight:600,color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.titulo}</span></>}
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
          {!isMobile&&<div style={{fontSize:12,color:T.muted}}>Total: <span style={{color:ch.color,fontWeight:700}}>{fmtSec(totalSec)}</span></div>}
          <button onClick={()=>setShowTP(true)}
            style={{minHeight:36,padding:'0 12px',borderRadius:8,background:'rgba(201,168,76,0.10)',border:'1px solid rgba(201,168,76,0.3)',color:T.gold,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'Inter,sans-serif',whiteSpace:'nowrap'}}>
            🎬{!isMobile&&' Teleprompter'}
          </button>
          <button onClick={()=>onSave(secs)}
            style={{minHeight:36,padding:'0 14px',borderRadius:8,background:ch.colorBg,border:`1px solid ${ch.colorBorder}`,color:ch.color,fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'Inter,sans-serif'}}

                      <div style={{display:'flex',gap:8}}>

                      </h2>
                  }
                </div>
                <div style={{display:'flex',gap:6,flexShrink:0}}>
                  <button onClick={()=>moveSection(activeIdx,-1)} disabled={activeIdx===0} style={{width:28,height:28,borderRadius:7,background:'transparent',border:`1px solid ${T.border}`,color:activeIdx===0?T.dim:T.muted,cursor:activeIdx===0?'default':'pointer',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center'}}>↑</button>
                  <button onClick={()=>moveSection(activeIdx,1)} disabled={activeIdx===secs.length-1} style={{width:28,height:28,borderRadius:7,background:'transparent',border:`1px solid ${T.border}`,color:activeIdx===secs.length-1?T.dim:T.muted,cursor:activeIdx===secs.length-1?'default':'pointer',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center'}}>↓</button>
                  <button onClick={()=>deleteSection(activeIdx)} style={{width:28,height:28,borderRadius:7,background:'transparent',border:'1px solid rgba(248,113,113,0.2)',color:'rgba(248,113,113,0.5)',cursor:'pointer',fontSize:11,display:'flex',alignItems:'center',justifyContent:'center'}}
                    onMouseEnter={e=>{e.currentTarget.style.background='rgba(248,113,113,0.08)';e.currentTarget.style.color=T.red;}}
                    onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color='rgba(248,113,113,0.5)';}}>✕</button>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
                <div style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:12,padding:'14px 16px'}}>
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:'uppercase',color:T.dim,marginBottom:8}}>Duración estimada</div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <input type="number" min="0" max="3600" value={active.duracion} onChange={e=>updateSec(activeIdx,'duracion',e.target.value)}

                    <span style={{fontSize:12,color:T.muted}}>seg · <span style={{color:T.dim}}>{fmtSec(parseInt(active.duracion)||0)}</span></span>
                  </div>
                </div>
                <div style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:12,padding:'14px 16px'}}>
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:'uppercase',color:T.dim,marginBottom:8}}>Palabras</div>
                  <div style={{fontSize:22,fontWeight:700,color:T.text,lineHeight:1}}>{active.texto.trim()?active.texto.trim().split(/\s+/).length:0}</div>
                  <div style={{fontSize:11,color:T.dim,marginTop:2}}>≈ {Math.ceil((active.texto.trim().split(/\s+/).length||0)/130)} min lectura</div>
                </div>
                <div style={{background:T.s2,border:`1px solid ${T.border}`,borderRadius:12,padding:'14px 16px'}}>
                  <div style={{fontSize:10,fontWeight:700,letterSpacing:1,textTransform:'uppercase',color:T.dim,marginBottom:8}}>Total guión</div>
                  <div style={{fontSize:22,fontWeight:700,color:ch.color,lineHeight:1}}>{fmtSec(totalSec)}</div>
                  <div style={{fontSize:11,color:T.dim,marginTop:2}}>{secs.length} sección{secs.length!==1?'es':''}</div>
                </div>
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:600,color:T.muted,marginBottom:8,letterSpacing:0.5}}>Guión · {active.nombre}</div>
                <textarea value={active.texto} onChange={e=>updateSec(activeIdx,'texto',e.target.value)}
                  placeholder={`Escribe el guión para "${active.nombre}"...\n\nTips:\n— Usa corchetes [B-ROLL] para tomas de apoyo\n— Usa [PAUSA] para tiempos\n— Usa [TEXTO EN PANTALLA: ...] para textos en video`}
                  style={{width:'100%',minHeight:280,background:T.s2,border:`1px solid ${T.border}`,borderRadius:12,padding:'16px 18px',fontFamily:'Inter,sans-serif',fontSize:13,color:T.text,outline:'none',lineHeight:1.8,resize:'vertical',transition:'border-color 0.2s'}}
                  onFocus={e=>{e.target.style.borderColor=T.borderH;}} onBlur={e=>{e.target.style.borderColor=T.border;}}/>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <div style={{fontSize:11,color:T.dim,flexShrink:0}}>Progreso del guión</div>
                <div style={{flex:1,height:3,background:'rgba(255,255,255,0.06)',borderRadius:2,overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${Math.min(100,(active.texto.trim().split(/\s+/).length||0)/2)}%`,background:ch.gradient,borderRadius:2,transition:'width 0.3s'}}/>
                </div>
                <div style={{fontSize:11,color:T.dim,flexShrink:0}}>{Math.min(100,Math.round((active.texto.trim().split(/\s+/).length||0)/2))}%</div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

          {CHANNELS.iarcania.logo}

          onMouseEnter={e=>{if(active!==n.id){e.currentTarget.style.background='rgba(155,114,240,0.08)';e.currentTarget.style.color=T.muted;}}}

/* ═══════════════════════════════════════════════
   SECTION 1 — Mis plataformas

function SectionCanal({activePlatforms,setActivePlatforms,isMobile}){
  const px=isMobile?12:28;
  function toggle(p){
    setActivePlatforms(prev=>prev.includes(p)?prev.filter(x=>x!==p):[...prev,p]);
  }
  const PLAT_DESC={YouTube:'Videos largos, Shorts y transmisiones en vivo',TikTok:'Videos cortos y contenido viral','Instagram':'Reels, carruseles y posts'};
  return(
    <div style={{padding:`28px ${px}px`,animation:'fadeIn 0.35s ease',overflowY:'auto',flex:1}}>
      <div style={{marginBottom:24}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:2,textTransform:'uppercase',color:T.gold,marginBottom:6,display:'flex',alignItems:'center',gap:8}}><span style={{width:18,height:1,background:T.gold,display:'inline-block'}}/>Plataformas</div>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:T.text}}>Mis plataformas</h2>
        <div style={{fontSize:12,color:T.muted,marginTop:4}}>Las plataformas activas aparecerán como opciones al crear derivados.</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10,maxWidth:480}}>
        {PLATFORMS.map(p=>{
          const isOn=activePlatforms.includes(p);
          const pi=PLAT_INFO[p];
          return(
            <button key={p} onClick={()=>toggle(p)}
              style={{display:'flex',alignItems:'center',gap:16,padding:'18px 20px',borderRadius:14,background:isOn?pi.bg:'rgba(255,255,255,0.02)',border:`1px solid ${isOn?pi.border:T.border}`,cursor:'pointer',fontFamily:'Inter,sans-serif',transition:'all 0.2s',textAlign:'left',minHeight:72}}
              onMouseEnter={e=>{if(!isOn){e.currentTarget.style.background='rgba(255,255,255,0.04)';e.currentTarget.style.borderColor=T.borderH;}}}
              onMouseLeave={e=>{if(!isOn){e.currentTarget.style.background='rgba(255,255,255,0.02)';e.currentTarget.style.borderColor=T.border;}}}>
              <div style={{width:44,height:44,borderRadius:12,background:isOn?`${pi.color}20`:'rgba(255,255,255,0.04)',border:`1px solid ${isOn?pi.border:T.border}`,display:'flex',alignItems:'center',justifyContent:'center',color:isOn?pi.color:T.muted,flexShrink:0,transition:'all 0.2s'}}>
                <PlatformIcon p={p} active={isOn} size={22}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:700,color:isOn?T.text:T.muted,marginBottom:3,transition:'color 0.2s'}}>{p}</div>
                <div style={{fontSize:12,color:T.dim}}>{PLAT_DESC[p]}</div>
              </div>
              {/* Toggle switch */}
              <div style={{width:42,height:24,borderRadius:12,background:isOn?pi.color:'rgba(255,255,255,0.08)',position:'relative',transition:'background 0.25s',flexShrink:0}}>
                <div style={{position:'absolute',top:3,left:isOn?'calc(100% - 21px)':3,width:18,height:18,borderRadius:'50%',background:'#fff',boxShadow:'0 1px 4px rgba(0,0,0,0.3)',transition:'left 0.25s'}}/>
              </div>
            </button>
          );
        })}
      </div>
      <div style={{marginTop:20,padding:'14px 16px',background:T.s2,border:`1px solid ${T.border}`,borderRadius:12,fontSize:12,color:T.muted,maxWidth:480}}>
        <span style={{color:T.purpleL,fontWeight:600}}>{activePlatforms.length}</span> plataforma{activePlatforms.length!==1?'s':''} activa{activePlatforms.length!==1?'s':''} · La identidad de canal (IArcanIA / VoidStoic) se define en cada pieza de contenido.
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════

function ContentCard({item,onStatusChange,onDelete,onOpenGuion,onOpenDetail,isMobile}){
  const [hov,setHov]=useState(false);
  const [menuOpen,setMenuOpen]=useState(false);
  const ch=CHANNELS[item.canal]||CHANNELS.iarcania;
  const doneSteps=Object.values(item.steps).filter(Boolean).length;
  const pct=Math.round((doneSteps/PROD_STEPS.length)*100);
  const guionFilled=item.guion&&item.guion.some(s=>s.texto&&s.texto.trim().length>0);
  const derivados=item.derivados||[];
  const px=isMobile?12:18;

  return(
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>{setHov(false);setMenuOpen(false);}}
      style={{background:hov?T.s2:T.s1,border:`1px solid ${hov?ch.colorBorder:T.border}`,borderRadius:14,padding:`16px ${px}px`,transition:'all 0.2s',position:'relative'}}>
      <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${ch.color},transparent)`,borderRadius:'14px 14px 0 0',opacity:hov?1:0,transition:'opacity 0.2s'}}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8,flexWrap:'wrap'}}>
            <ChannelBadge channelId={item.canal} small/>
            <FormatBadge format={item.formato}/>
            <StatusBadge status={item.estado} small/>
            {guionFilled&&<span style={{fontSize:10,fontWeight:600,color:T.green,background:'rgba(74,222,128,0.08)',border:'1px solid rgba(74,222,128,0.2)',borderRadius:100,padding:'1px 7px'}}>✓ Guión</span>}
          </div>
          <div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:8,lineHeight:1.4}}>{item.titulo}</div>
          {/* Derivados chips */}

/* ═══════════════════════════════════════════════
   SECTION 2 — Plan de Contenido
═══════════════════════════════════════════════ */
function SectionContenido({items,setItems,onOpenGuion,onOpenDetail,isMobile}){
  const [showModal,setShowModal]=useState(false);
  const [filter,setFilter]=useState('all');
  const [chanFilter,setChanFilter]=useState('all');
  const px=isMobile?12:28;

  const filtered=items.filter(i=>{
    const chanOk=chanFilter==='all'||i.canal===chanFilter;
    const statOk=filter==='all'||i.estado===filter;
    return chanOk&&statOk;
  });

  function handleSave(form){
    setItems(prev=>[{...form}, ...prev]);
    setShowModal(false);
  }
  function updateStatus(id,estado){setItems(prev=>prev.map(i=>i.id===id?{...i,estado}:i));}
  function deleteItem(id){setItems(prev=>prev.filter(i=>i.id!==id));}

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',animation:'fadeIn 0.35s ease'}}>
      {showModal&&<NewContentModal onSave={handleSave} onClose={()=>setShowModal(false)}/>}
      <div style={{padding:`22px ${px}px 14px`,borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:14,gap:10}}>
          <div>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:2,textTransform:'uppercase',color:T.gold,marginBottom:5,display:'flex',alignItems:'center',gap:8}}><span style={{width:18,height:1,background:T.gold,display:'inline-block'}}/>Plan de Contenido</div>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:isMobile?18:21,fontWeight:700,color:T.text}}>{filtered.length} {filtered.length===1?'pieza':'piezas'}</h2>
          </div>
          <button onClick={()=>setShowModal(true)} style={{display:'flex',alignItems:'center',gap:6,background:'rgba(155,114,240,0.16)',border:`1px solid ${T.borderH}`,borderRadius:10,padding:'0 14px',color:T.purpleL,fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'Inter,sans-serif',minHeight:44,flexShrink:0}}
            onMouseEnter={e=>{e.currentTarget.style.background='rgba(155,114,240,0.28)';}}
            onMouseLeave={e=>{e.currentTarget.style.background='rgba(155,114,240,0.16)';}}>
            <span style={{fontSize:16}}>+</span>{!isMobile&&' Agregar'}
          </button>
        </div>
        <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap'}}>
          {[['all','Todos'],...Object.values(CHANNELS).map(ch=>[ch.id,ch.name])].map(([v,l])=>{
            const ch=CHANNELS[v];
            return(
              <button key={v} onClick={()=>setChanFilter(v)} style={{padding:'4px 12px',minHeight:36,borderRadius:100,fontSize:11,fontWeight:600,background:chanFilter===v?(ch?ch.colorBg:'rgba(155,114,240,0.16)'):'transparent',border:`1px solid ${chanFilter===v?(ch?ch.colorBorder:T.borderH):T.border}`,color:chanFilter===v?(ch?ch.color:T.purpleL):T.muted,cursor:'pointer',transition:'all 0.15s',fontFamily:'Inter,sans-serif',display:'flex',alignItems:'center',gap:5}}>
                {ch&&<span style={{color:chanFilter===v?ch.color:T.dim}}>{ch.logo}</span>}{l}
              </button>
            );
          })}
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {[['all','Todos'],...Object.entries(STATUS).map(([v,s])=>[v,s.label])].map(([v,l])=>(
            <button key={v} onClick={()=>setFilter(v)} style={{padding:'4px 11px',minHeight:36,borderRadius:100,fontSize:11,fontWeight:600,background:filter===v?'rgba(155,114,240,0.16)':'transparent',border:`1px solid ${filter===v?T.borderH:T.border}`,color:filter===v?T.purpleL:T.muted,cursor:'pointer',transition:'all 0.15s',fontFamily:'Inter,sans-serif'}}>{l}</button>
          ))}
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:`14px ${px}px`,display:'flex',flexDirection:'column',gap:8}}>
        {filtered.length===0&&(
          <div style={{textAlign:'center',padding:'60px 0',color:T.dim}}>
            <div style={{fontSize:32,marginBottom:12}}>◎</div>
            <div style={{fontSize:14,fontWeight:500}}>Sin contenido {filter!=='all'?'en este estado':chanFilter!=='all'?`para ${CHANNELS[chanFilter]?.name}`:'planificado'}</div>
          </div>
        )}
        {filtered.map(item=><ContentCard key={item.id} item={item} onStatusChange={updateStatus} onDelete={deleteItem} onOpenGuion={onOpenGuion} onOpenDetail={onOpenDetail} isMobile={isMobile}/>)}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   SECTION 3 — Producción
═══════════════════════════════════════════════ */
function SectionProduccion({items,setItems,isMobile}){
  const [expanded,setExpanded]=useState({});
  const [chanFilter,setChanFilter]=useState('all');
  const px=isMobile?12:28;

  const filtered=chanFilter==='all'?items:items.filter(i=>i.canal===chanFilter);

  function toggleStep(itemId,step){
    setItems(prev=>prev.map(i=>{
      if(i.id!==itemId)return i;
      const newSteps={...i.steps,[step]:!i.steps[step]};
      const done=Object.values(newSteps).filter(Boolean).length;
      let estado=i.estado;
      if(done===PROD_STEPS.length) estado='publicado';
      else if(newSteps['Edición']) estado='editando';
      else if(newSteps['Grabación']) estado='grabando';
      return{...i,steps:newSteps,estado};
    }));
  }

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',animation:'fadeIn 0.35s ease'}}>
      <div style={{padding:`22px ${px}px 14px`,borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:2,textTransform:'uppercase',color:T.gold,marginBottom:5,display:'flex',alignItems:'center',gap:8}}><span style={{width:18,height:1,background:T.gold,display:'inline-block'}}/>Paso a paso</div>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:isMobile?18:21,fontWeight:700,color:T.text,marginBottom:14}}>Producción</h2>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {[['all','Todos'],...Object.values(CHANNELS).map(ch=>[ch.id,ch.name])].map(([v,l])=>{
            const ch=CHANNELS[v];
            return(<button key={v} onClick={()=>setChanFilter(v)} style={{padding:'4px 12px',minHeight:36,borderRadius:100,fontSize:11,fontWeight:600,background:chanFilter===v?(ch?ch.colorBg:'rgba(155,114,240,0.16)'):'transparent',border:`1px solid ${chanFilter===v?(ch?ch.colorBorder:T.borderH):T.border}`,color:chanFilter===v?(ch?ch.color:T.purpleL):T.muted,cursor:'pointer',transition:'all 0.15s',fontFamily:'Inter,sans-serif',display:'flex',alignItems:'center',gap:5}}>{ch&&<span>{ch.logo}</span>}{l}</button>);
          })}
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:`14px ${px}px`,display:'flex',flexDirection:'column',gap:8}}>
        {filtered.length===0&&(<div style={{textAlign:'center',padding:'60px 0',color:T.dim}}><div style={{fontSize:32,marginBottom:12}}>◎</div><div style={{fontSize:14}}>Sin contenido para mostrar</div></div>)}
        {filtered.map(item=>{
          const ch=CHANNELS[item.canal]||CHANNELS.iarcania;
          const doneCount=Object.values(item.steps).filter(Boolean).length;
          const pct=Math.round((doneCount/PROD_STEPS.length)*100);
          const isOpen=!!expanded[item.id];
          return(
            <div key={item.id} style={{background:T.s1,border:`1px solid ${isOpen?ch.colorBorder:T.border}`,borderRadius:14,overflow:'hidden',transition:'border-color 0.2s'}}>
              <button onClick={()=>setExpanded(e=>({...e,[item.id]:!e[item.id]}))} style={{width:'100%',display:'flex',alignItems:'center',gap:12,padding:'14px 16px',background:'transparent',border:'none',cursor:'pointer',fontFamily:'Inter,sans-serif',minHeight:56}}>
                <div style={{flex:1,textAlign:'left'}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4,flexWrap:'wrap'}}>
                    <ChannelBadge channelId={item.canal} small/>
                    <FormatBadge format={item.formato}/>
                    <StatusBadge status={item.estado} small/>
                  </div>
                  <div style={{fontSize:13,fontWeight:700,color:T.text,lineHeight:1.4}}>{item.titulo}</div>
                </div>
                <div style={{flexShrink:0,textAlign:'right'}}>
                  <div style={{fontSize:11,fontWeight:700,color:pct===100?T.green:ch.color,marginBottom:4}}>{pct}%</div>
                  <div style={{width:80,height:4,background:'rgba(255,255,255,0.06)',borderRadius:2,overflow:'hidden'}}>
                    <div style={{height:'100%',width:`${pct}%`,background:pct===100?'linear-gradient(90deg,#22c55e,#4ade80)':ch.gradient,borderRadius:2,transition:'width 0.4s ease'}}/>
                  </div>
                </div>
                <span style={{color:T.dim,fontSize:12,marginLeft:4,transition:'transform 0.2s',transform:isOpen?'rotate(180deg)':'none',display:'block'}}>▾</span>
              </button>
              {isOpen&&(
                <div style={{borderTop:`1px solid ${T.border}`,padding:'14px 16px 16px'}}>
                  <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
                    {PROD_STEPS.map((step)=>{
                      const done=item.steps[step];
                      return(
                        <button key={step} onClick={()=>toggleStep(item.id,step)}
                          style={{display:'flex',alignItems:'center',gap:7,padding:'0 12px',minHeight:44,borderRadius:8,background:done?'rgba(74,222,128,0.1)':'rgba(255,255,255,0.03)',border:`1px solid ${done?'rgba(74,222,128,0.3)':T.border}`,color:done?T.green:T.muted,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'Inter,sans-serif',transition:'all 0.2s'}}>
                          <span style={{width:16,height:16,borderRadius:4,background:done?T.green:'transparent',border:`1.5px solid ${done?T.green:T.dim}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#000',flexShrink:0,transition:'all 0.2s'}}>{done?'✓':''}</span>
                          {step}
                        </button>
                      );
                    })}
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:0}}>
                    {PROD_STEPS.map((step,idx)=>{
                      const done=item.steps[step];
                      return(
                        <React.Fragment key={step}>
                          <div style={{width:22,height:22,borderRadius:'50%',background:done?T.green:'rgba(255,255,255,0.05)',border:`1.5px solid ${done?T.green:T.dim}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:done?'#000':T.dim,fontWeight:700,flexShrink:0,transition:'all 0.3s'}}>{done?'✓':idx+1}</div>
                          {idx<PROD_STEPS.length-1&&<div style={{flex:1,height:1.5,background:done?`linear-gradient(90deg,${T.green},rgba(74,222,128,0.3))`:'rgba(255,255,255,0.06)',transition:'background 0.4s'}}/>}
                        </React.Fragment>
                      );
                    })}
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
                    {PROD_STEPS.map(step=><div key={step} style={{fontSize:9,color:T.dim,textAlign:'center',flex:1}}>{step}</div>)}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   SECTION 4 — Vista Semanal (rewrite)
═══════════════════════════════════════════════ */
function SectionSemanal({items,onOpenGuion,onOpenDetail}){
  const today=new Date();
  const startOfWeek=new Date(today); startOfWeek.setDate(today.getDate()-today.getDay()+1);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(startOfWeek);d.setDate(startOfWeek.getDate()+i);return d;});
  const DAY_NAMES=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const MONTH_NAMES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const [chanFilter,setChanFilter]=useState('all');
  const [expandedDays,setExpandedDays]=useState({});
  const isMobile=useMobile();

  const filtered=chanFilter==='all'?items:items.filter(i=>i.canal===chanFilter);
  const getItemsForDay=day=>{const iso=day.toISOString().slice(0,10);return filtered.filter(i=>i.fechaGrab===iso);};
  const isToday=d=>d.toDateString()===today.toDateString();
  const px=isMobile?12:28;

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',animation:'fadeIn 0.35s ease'}}>
      <div style={{padding:`22px ${px}px 14px`,borderBottom:`1px solid ${T.border}`,flexShrink:0}}>

          <div>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:2,textTransform:'uppercase',color:T.gold,marginBottom:5,display:'flex',alignItems:'center',gap:8}}><span style={{width:18,height:1,background:T.gold,display:'inline-block'}}/>Vista Semanal</div>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:isMobile?18:21,fontWeight:700,color:T.text}}>Semana del {startOfWeek.getDate()} {MONTH_NAMES[startOfWeek.getMonth()]}</h2>
          </div>
          {!isMobile&&<div style={{fontSize:11,color:T.muted,background:T.s2,border:`1px solid ${T.border}`,borderRadius:8,padding:'5px 12px'}}>{today.toLocaleDateString('es-CO',{weekday:'long',month:'long',day:'numeric'})}</div>}
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {[['all','Todos'],...Object.values(CHANNELS).map(ch=>[ch.id,ch.name])].map(([v,l])=>{

          })}

            {days.map((day,i)=>{

                    <div style={{display:'flex',alignItems:'center',gap:14}}>
                      <div style={{textAlign:'center',minWidth:40}}>
                        <div style={{fontSize:10,fontWeight:700,color:tod?T.purpleL:T.dim,letterSpacing:0.5,textTransform:'uppercase'}}>{DAY_NAMES[i]}</div>

                                <StatusBadge status={item.estado} small/>
                              </div>
                              <div style={{fontSize:14,fontWeight:700,color:T.text,lineHeight:1.4}}>{item.titulo}</div>
                              {item.horaGrab&&<div style={{fontSize:11,color:T.muted}}>⏱ Grabación: {item.horaGrab}</div>}
                            </button>
                            {ders.map(d=>{
                              const s=STATUS[d.estado]||STATUS.idea;
                              return(
                                <div key={d.id} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 12px',background:T.s3,borderRadius:8,marginTop:4,marginLeft:12,border:`1px solid ${T.border}`}}>
                                  <PlatformIcon p={d.plataforma} size={12}/>
                                  <span style={{fontSize:11,fontWeight:600,color:T.muted}}>{d.formato||'Clip'}</span>
                                  <span style={{width:5,height:5,borderRadius:'50%',background:s.dot,flexShrink:0}}/>
                                  <span style={{fontSize:11,color:s.color}}>{s.label}</span>
                                  {d.duracion&&<span style={{fontSize:11,color:T.dim,marginLeft:'auto'}}>{fmtSec(parseInt(d.duracion)||0)}</span>}
                                </div>
                              );
                            })}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ) : (
          /* ── Desktop: 7-column grid ── */
          <>
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,minmax(120px,1fr))',gap:8}}>
              {days.map((day,i)=>{
                const dayItems=getItemsForDay(day);
                const tod=isToday(day);
                return(
                  <div key={i} style={{background:tod?'rgba(155,114,240,0.07)':T.s1,border:`1px solid ${tod?T.borderH:T.border}`,borderRadius:14,overflow:'hidden',minHeight:120,position:'relative'}}>
                    <div style={{padding:'9px 9px 7px',borderBottom:`1px solid ${tod?'rgba(155,114,240,0.2)':T.border}`,background:tod?'rgba(155,114,240,0.10)':'transparent'}}>
                      <div style={{fontSize:10,fontWeight:700,color:tod?T.purpleL:T.dim,letterSpacing:0.5}}>{DAY_NAMES[i]}</div>
                      <div style={{fontSize:17,fontWeight:700,lineHeight:1.1,marginTop:2,color:tod?T.purpleL:T.text,fontFamily:tod?"'Playfair Display',serif":'inherit'}}>{day.getDate()}</div>
                      {tod&&<div style={{position:'absolute',top:8,right:8,width:6,height:6,borderRadius:'50%',background:T.purple,animation:'pulse 2s infinite'}}/>}
                    </div>
                    <div style={{padding:'7px 6px',display:'flex',flexDirection:'column',gap:4}}>
                      {dayItems.length===0&&<div style={{fontSize:9,color:T.dim,textAlign:'center',padding:'10px 0',opacity:0.4}}>—</div>}
                      {dayItems.map(item=>{
                        const ch=CHANNELS[item.canal]||CHANNELS.iarcania;
                        const s=STATUS[item.estado]||STATUS.idea;
                        const ders=item.derivados||[];
                        return(
                          <button key={item.id} onClick={()=>onOpenDetail(item)}
                            style={{display:'block',width:'100%',background:`${ch.color}10`,border:`1px solid ${ch.colorBorder}`,borderRadius:6,padding:'6px',cursor:'pointer',fontFamily:'Inter,sans-serif',textAlign:'left',minHeight:44}}>
                            <div style={{fontSize:9,fontWeight:700,color:ch.colorLight,marginBottom:2}}>{ch.name}</div>
                            <div style={{fontSize:10,fontWeight:600,color:T.text,lineHeight:1.4}}>{item.titulo}</div>
                            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:3}}>
                              <span style={{fontSize:9,color:s.color,fontWeight:600}}>{FORMAT_ICONS[item.formato]}</span>
                              {ders.length>0&&<span style={{fontSize:9,color:T.dim}}>+{ders.length}</span>}
                              {item.horaGrab&&<span style={{fontSize:9,color:T.dim}}>{item.horaGrab}</span>}
                            </div>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{display:'flex',gap:16,marginTop:14,flexWrap:'wrap'}}>
              {Object.entries(STATUS).map(([k,s])=>(
                <div key={k} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:T.muted}}>
                  <span style={{width:8,height:8,borderRadius:2,background:s.dot,display:'inline-block'}}/>{s.label}
                </div>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════ */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showRainBg": true,
  "compactCards": false,
  "defaultChannel": "all"
}/*EDITMODE-END*/;

const SAMPLE_ITEMS=[
  {id:1,canal:'iarcania',titulo:'Cómo automatizar tu negocio con IA en 2026',formato:'Video largo',plataformaOrigen:'YouTube',fechaGrab:'2026-05-05',horaGrab:'10:00',horaPub:'18:00',estado:'editando',
   steps:{Guión:true,Grabación:true,Edición:false,Thumbnail:false,Programar:false,Publicar:false},
   guion:[{id:1,nombre:'Intro / Hook',duracion:30,texto:'¿Sabías que el 80% de las tareas repetitivas de tu negocio pueden automatizarse hoy mismo?'},{id:2,nombre:'Desarrollo principal',duracion:180,texto:''},{id:3,nombre:'Demo en vivo',duracion:120,texto:''},{id:4,nombre:'CTA & Cierre',duracion:30,texto:''}],
   derivados:[{id:101,plataforma:'TikTok',formato:'Short',duracion:'60',estado:'idea',notas:'Cortar hook + demo rápida'},{id:102,plataforma:'Instagram',formato:'Reel',duracion:'90',estado:'idea',notas:''}]},
  {id:2,canal:'voidstoic',titulo:'El estoicismo y la ansiedad moderna',formato:'Video largo',plataformaOrigen:'YouTube',fechaGrab:'2026-05-06',horaGrab:'14:00',horaPub:'20:00',estado:'grabando',
   steps:{Guión:true,Grabación:false,Edición:false,Thumbnail:false,Programar:false,Publicar:false},
   guion:[{id:1,nombre:'Apertura',duracion:45,texto:'Marco Aurelio escribió: "No pierdas más tiempo discutiendo qué debe ser un buen hombre. Sé uno."'},{id:2,nombre:'El problema actual',duracion:120,texto:''},{id:3,nombre:'Solución estoica',duracion:150,texto:''},{id:4,nombre:'CTA',duracion:30,texto:''}],
   derivados:[{id:201,plataforma:'TikTok',formato:'Short',duracion:'45',estado:'idea',notas:''}]},
  {id:3,canal:'iarcania',titulo:'3 herramientas de IA que no conoces',formato:'Short',plataformaOrigen:'YouTube',fechaGrab:'2026-05-07',horaGrab:'09:00',horaPub:'12:00',estado:'idea',steps:{Guión:false,Grabación:false,Edición:false,Thumbnail:false,Programar:false,Publicar:false},guion:[],derivados:[]},
  {id:4,canal:'voidstoic',titulo:'Por qué el Ego te destruye (y cómo frenarlo)',formato:'Reel',plataformaOrigen:'YouTube',fechaGrab:'2026-05-08',horaGrab:'11:00',horaPub:'19:00',estado:'idea',steps:{Guión:false,Grabación:false,Edición:false,Thumbnail:false,Programar:false,Publicar:false},guion:[],derivados:[]},
];

function App(){
  const [tweaks, setTweak]=useTweaks(TWEAK_DEFAULTS);
  const [nav,setNav]=useState('contenido');
  const [items,setItems]=useState([]);
  const [guionItem,setGuionItem]=useState(null);
  const [detailItem,setDetailItem]=useState(null);
  const [activePlatforms,setActivePlatforms]=useState(['YouTube','TikTok','Instagram']);
  const [sbReady,setSbReady]=useState(false);
  const [showConnect,setShowConnect]=useState(false);
  const [connectEmail,setConnectEmail]=useState('');
  const [connectPass,setConnectPass]=useState('');
  const [connectErr,setConnectErr]=useState('');
  const prevItemsRef=useRef(null);
  const isMobile=useMobile();

  useEffect(()=>{
    const el=document.getElementById('rain');
    if(el) el.style.display=tweaks.showRainBg?'block':'none';
  },[tweaks.showRainBg]);

  useEffect(()=>{loadFromSB();},[]);

  /* Sync items → Supabase on every change (diff-based) */
  useEffect(()=>{
    if(!sbReady||prevItemsRef.current===null)return;
    const prev=prevItemsRef.current;
    const prevMap=new Map(prev.map(i=>[String(i.id),i]));
    const currMap=new Map(items.map(i=>[String(i.id),i]));
    prev.filter(i=>!currMap.has(String(i.id))).forEach(i=>{
      SB_P.from('scripts').delete().eq('id',String(i.id));
    });
    items.filter(i=>!prevMap.has(String(i.id))).forEach(i=>{
      SB_P.from('scripts').upsert(itemToRow(i));
    });
    items.filter(i=>prevMap.has(String(i.id))).forEach(i=>{
      const old=prevMap.get(String(i.id));
      if(JSON.stringify(old)!==JSON.stringify(i))
        SB_P.from('scripts').update(itemToRow(i)).eq('id',String(i.id));
    });
    prevItemsRef.current=items;
  },[items,sbReady]);

  async function loadFromSB(){
    const {data:{session}}=await SB_P.auth.getSession();
    if(session){
      setSbReady(true);
      const {data}=await SB_P.from('scripts').select('*').order('created_at',{ascending:false});
      const loaded=data&&data.length?data.map(rowToItem):SAMPLE_ITEMS;
      prevItemsRef.current=loaded;
      setItems(loaded);
    }else{
      setItems(SAMPLE_ITEMS);
      setShowConnect(true);
    }
  }

  async function handleConnect(){
    setConnectErr('');
    const {error}=await SB_P.auth.signInWithPassword({email:connectEmail,password:connectPass});
    if(error){setConnectErr(error.message);return;}
    setShowConnect(false);
    loadFromSB();
  }

  const ConnectModal=showConnect&&(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{background:'#0e0e12',border:'1px solid rgba(155,114,240,0.35)',borderRadius:16,padding:'28px 32px',width:320,fontFamily:'Inter,sans-serif'}}>
        <div style={{fontSize:16,fontWeight:700,color:'#f0eeff',marginBottom:4}}>Conectar a Supabase</div>
        <div style={{fontSize:12,color:'#8a86b0',marginBottom:20}}>Usa las mismas credenciales del OS</div>
        <input value={connectEmail} onChange={e=>setConnectEmail(e.target.value)}
          placeholder="Email" type="email"
          style={{width:'100%',background:'#060609',border:'1px solid rgba(255,255,255,0.08)',borderRadius:8,padding:'10px 12px',color:'#f0eeff',fontFamily:'Inter,sans-serif',fontSize:13,outline:'none',marginBottom:10,boxSizing:'border-box'}}/>
        <input value={connectPass} onChange={e=>setConnectPass(e.target.value)}
          placeholder="Contraseña" type="password"
          onKeyDown={e=>e.key==='Enter'&&handleConnect()}
          style={{width:'100%',background:'#060609',border:'1px solid rgba(255,255,255,0.08)',borderRadius:8,padding:'10px 12px',color:'#f0eeff',fontFamily:'Inter,sans-serif',fontSize:13,outline:'none',marginBottom:10,boxSizing:'border-box'}}/>
        {connectErr&&<div style={{fontSize:11,color:'#ef4444',marginBottom:8}}>{connectErr}</div>}
        <button onClick={handleConnect}
          style={{width:'100%',padding:'11px',borderRadius:8,background:'rgba(155,114,240,0.2)',border:'1px solid rgba(155,114,240,0.4)',color:'#c4b5fd',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>
          Conectar
        </button>
        <button onClick={()=>setShowConnect(false)}
          style={{width:'100%',padding:'8px',marginTop:8,borderRadius:8,background:'transparent',border:'none',color:'#8a86b0',fontSize:12,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>
          Continuar sin guardar
        </button>
      </div>
    </div>
  );

  function updateItem(updated){setItems(prev=>prev.map(i=>i.id===updated.id?updated:i));}
  function deleteItem(id){setItems(prev=>prev.filter(i=>i.id!==id));}
  function openDetail(item){
    const latest=items.find(i=>i.id===item.id)||item;
    setDetailItem(latest);
  }
  function openGuion(item){setDetailItem(null);setGuionItem(item);}
  function saveGuion(secs){
    setItems(prev=>prev.map(i=>i.id===guionItem.id?{...i,guion:secs}:i));
    setGuionItem(null);
  }

  const sectionTitle={canal:'Plataformas',contenido:'Contenido',produccion:'Producción',semanal:'Semana'};

  const DetailModal=detailItem&&(
    <ItemDetailModal
      item={detailItem}
      onClose={()=>setDetailItem(null)}
      onOpenGuion={openGuion}
      onUpdate={u=>{updateItem(u);setDetailItem(u);}}
      onDelete={()=>{deleteItem(detailItem.id);setDetailItem(null);}}
    />
  );

  if(guionItem){
    return(
      <div style={{width:'100vw',height:'100vh',display:'flex',overflow:'hidden',position:'relative',zIndex:1}}>
        {ConnectModal}
        {DetailModal}
        {!isMobile&&<Sidebar active={nav} onNav={n=>{setGuionItem(null);setNav(n);}} isMobile={false}/>}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          <ScriptEditor item={guionItem} onBack={()=>setGuionItem(null)} onSave={saveGuion} isMobile={isMobile}/>
        </div>
      </div>
    );
  }

  return(
    <div style={{width:'100vw',height:'100vh',display:'flex',overflow:'hidden',position:'relative',zIndex:1}}>
      {ConnectModal}
      {DetailModal}
      {!isMobile&&<Sidebar active={nav} onNav={setNav} isMobile={false}/>}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',paddingBottom:isMobile?56:0}}>
        {/* Topbar */}
        <div style={{height:52,borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:`0 ${isMobile?12:24}px`,background:'rgba(6,6,9,0.85)',backdropFilter:'blur(8px)',flexShrink:0,zIndex:10}}>
          <div style={{display:'flex',alignItems:'center',gap:isMobile?6:12,minWidth:0}}>
            {isMobile
              ? <span style={{fontSize:14,fontWeight:700,color:T.purpleL}}>{sectionTitle[nav]}</span>
              : <><Logo size={17}/><span style={{color:T.dim,fontSize:14}}>/</span><span style={{fontSize:12,color:T.muted,fontWeight:500}}>Planificador</span><span style={{color:T.dim,fontSize:14}}>/</span><span style={{fontSize:12,color:T.purpleL,fontWeight:600}}>{sectionTitle[nav]}</span></>
            }
          </div>
          {!isMobile&&(
            <div style={{display:'flex',gap:6}}>
              {Object.values(CHANNELS).map(ch=>(
                <div key={ch.id} style={{display:'flex',alignItems:'center',gap:6,padding:'4px 10px',background:ch.colorBg,border:`1px solid ${ch.colorBorder}`,borderRadius:100,fontSize:10,fontWeight:700,color:ch.color,cursor:'pointer'}} onClick={()=>setNav('canal')}>
                  {ch.logo} {ch.name}
                  <span style={{width:5,height:5,borderRadius:'50%',background:ch.dot,animation:'pulse 2s infinite'}}/>
                </div>
              ))}
            </div>
          )}
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {!isMobile&&<span style={{fontSize:11,color:T.dim}}>{new Date().toLocaleDateString('es-CO',{weekday:'short',month:'short',day:'numeric'})}</span>}
            <div style={{width:28,height:28,borderRadius:'50%',background:'rgba(155,114,240,0.15)',border:`1px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:T.purple}}>A</div>
          </div>
        </div>
        {/* Section */}
        <div style={{flex:1,overflowY:nav==='canal'?'auto':'hidden',display:'flex',flexDirection:'column'}}>
          {nav==='canal'      && <SectionCanal activePlatforms={activePlatforms} setActivePlatforms={setActivePlatforms} isMobile={isMobile}/>}
          {nav==='contenido'  && <SectionContenido items={items} setItems={setItems} onOpenGuion={openGuion} onOpenDetail={openDetail} isMobile={isMobile}/>}
          {nav==='produccion' && <SectionProduccion items={items} setItems={setItems} isMobile={isMobile}/>}
          {nav==='semanal'    && <SectionSemanal items={items} onOpenGuion={openGuion} onOpenDetail={openDetail}/>}
        </div>
      </div>
      {isMobile&&<Sidebar active={nav} onNav={setNav} isMobile={true}/>}
      {!isMobile&&(
        <TweaksPanel>
          <TweakSection title="Apariencia">
            <TweakToggle label="Lluvia de fondo" value={tweaks.showRainBg} onChange={v=>setTweak('showRainBg',v)}/>
            <TweakToggle label="Tarjetas compactas" value={tweaks.compactCards} onChange={v=>setTweak('compactCards',v)}/>
          </TweakSection>
          <TweakSection title="Navegación rápida">
            <TweakButton label="→ Plataformas" onClick={()=>setNav('canal')}/>
            <TweakButton label="→ Vista semanal" onClick={()=>setNav('semanal')}/>
            <TweakButton label="→ Producción" onClick={()=>setNav('produccion')}/>
          </TweakSection>
        </TweaksPanel>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
