  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    :root {
      --bg:        #07070e;
      --bg-alt:    #0b0b14;
      --bg-card:   #10101a;
      --fg:        #e8e6f0;
      --fg-muted:  #7a788f;
      --fg-dim:    #3e3c52;
      --accent:    #9b72f0;          /* single purple accent, desaturated */
      --accent-dim: rgba(155,114,240,0.12);
      --accent-border: rgba(155,114,240,0.18);
      --accent-glow: rgba(155,114,240,0.30);
      --gold:      #c9a84c;          /* muted gold, used sparingly */
      --gold-dim:  rgba(201,168,76,0.10);
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 22px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── Noise grain ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.5;
    }

    /* ── Rain canvas ── */
    #rain-canvas {
      position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.45;
    }

    /* ── Logo watermark ── */
    #logo-bg {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 2;
      opacity: 0.030;
      width: min(70vw, 70vh);
      height: min(70vw, 70vh);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

    /* ── Section label ── */
    .section-label {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 600; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--gold);
    }
    .section-label::before {
      content: ''; display: block; width: 20px; height: 1px; background: var(--gold);
    }

    /* ── Gradient text (restrained — only used once per section) ── */
    .accent-text {
      color: var(--accent);
    }

    /* ── Services grid ── */
    .services-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
    @media (max-width: 1024px) { .services-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 640px)  { .services-grid { grid-template-columns: 1fr; } }

    .why-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: center; }
    @media (max-width: 900px) { .why-grid { grid-template-columns: 1fr; } }

    .nav-desktop { display: flex !important; }
    .nav-hamburger { display: none !important; }
    @media (max-width: 768px) {
      .nav-desktop { display: none !important; }
      .nav-hamburger { display: flex !important; }
    }

    /* ── WhatsApp FAB ── */
    .whatsapp-fab {
      position: fixed; bottom: 28px; right: 28px;
      width: 52px; height: 52px; background: #1a8f4f;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(26,143,79,0.35); z-index: 90;
      text-decoration: none; transition: transform 0.2s;
    }
    .whatsapp-fab:hover { transform: scale(1.08); }

    @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,28px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-14px,-20px)} }
    @keyframes pulse-dim { 0%,100%{opacity:0.8;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

    /* ── Scattered eye watermarks ── */
    .eye-scatter {
      position: fixed; pointer-events: none; z-index: 2;
      animation: eyeDrift 18s ease-in-out infinite;
    }
    @keyframes eyeDrift {
      0%,100% { transform: translate(0,0) rotate(0deg); }
      33%      { transform: translate(8px,-12px) rotate(3deg); }
      66%      { transform: translate(-6px,8px) rotate(-2deg); }
    }
  </style>

  <script>
    /* ─────────────────────────────────────────
       Eye Rain drawing utility
       Draws eye shape as base, clips rain inside
    ───────────────────────────────────────── */
    function createEyeRain(canvas, rainRGB, size) {
      const S = size || 300;
      canvas.width  = S;
      canvas.height = S;
      const ctx = canvas.getContext('2d');
      const cx = S / 2, cy = S / 2;
      const rx = S * 0.38, ry = S * 0.38;
      // iris and sclera sizes
      const irisR  = S * 0.17;
      const scleraR = S * 0.085;
      const pupilR  = S * 0.035;

      // Build drops relative to canvas size
      const count = Math.max(30, Math.floor(S / 6));
      const drops = Array.from({ length: count }, () => ({
        x: Math.random() * S,
        y: Math.random() * S,
        speed: (S / 300) * (0.8 + Math.random() * 1.6),
        len:   (S / 300) * (10 + Math.random() * 20),
        opacity: 0.70 + Math.random() * 0.30,
      }));

      function drawEyePath(c) {
        c.beginPath();
        c.moveTo(cx, cy - ry);
        c.quadraticCurveTo(cx + rx, cy, cx, cy + ry);
        c.quadraticCurveTo(cx - rx, cy, cx, cy - ry);
        c.closePath();
      }

      function frame() {
        ctx.clearRect(0, 0, S, S);

        // 1. Fill eye shape as dark base
        ctx.save();
        drawEyePath(ctx);
        ctx.fillStyle = '#08060f';
        ctx.fill();

        // 2. Draw iris ring
        ctx.beginPath();
        ctx.arc(cx, cy, irisR, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${rainRGB},0.25)`;
        ctx.lineWidth = S * 0.007;
        ctx.stroke();

        // 3. Clip rain to eye shape
        ctx.globalCompositeOperation = 'source-atop';
        drawEyePath(ctx);
        ctx.clip();

        drops.forEach(d => {
          ctx.beginPath();
          ctx.moveTo(d.x, d.y);
          ctx.lineTo(d.x - 0.7, d.y + d.len);
          ctx.strokeStyle = `rgba(${rainRGB},${d.opacity})`;
          ctx.lineWidth = S * 0.003;
          ctx.stroke();
          d.y += d.speed;
          if (d.y > S) { d.y = -d.len; d.x = Math.random() * S; }
        });
        ctx.restore();

        // 4. Draw iris radial lines on top
        ctx.globalCompositeOperation = 'source-over';
        for (let i = 0; i < 8; i++) {
          const angle = (i / 8) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(cx + Math.cos(angle) * irisR * 0.72, cy + Math.sin(angle) * irisR * 0.72);
          ctx.lineTo(cx + Math.cos(angle) * irisR, cy + Math.sin(angle) * irisR);
          ctx.strokeStyle = `rgba(${rainRGB},0.20)`;
          ctx.lineWidth = S * 0.005;
          ctx.stroke();
        }

        // 5. Sclera (white of eye) — tinted with rain color
        ctx.beginPath();
        ctx.arc(cx, cy, scleraR, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${rainRGB},0.80)`;
        ctx.fill();

        // 6. Pupil
        ctx.beginPath();
        ctx.arc(cx, cy, pupilR, 0, Math.PI * 2);
        ctx.fillStyle = '#07070e';
        ctx.fill();

        // 7. Mandorla outline
        drawEyePath(ctx);
        ctx.strokeStyle = `rgba(${rainRGB},0.30)`;
        ctx.lineWidth = S * 0.006;
        ctx.stroke();

        requestAnimationFrame(frame);
      }
      frame();
    }

    // ── Rain animation ──
    const canvas = document.getElementById('rain-canvas');
    const ctx = canvas.getContext('2d');
    let drops = [];

    function initRain() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      drops = [];
      const count = Math.floor(canvas.width / 9);
      for (let i = 0; i < count; i++) {
        drops.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          speed: 1.8 + Math.random() * 2.8,
          len: 22 + Math.random() * 38,
          opacity: 0.45 + Math.random() * 0.55,
          width: 0.7 + Math.random() * 1.0,
        });
      }
    }

    function drawRain() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drops.forEach(d => {
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x - 1, d.y + d.len);
        ctx.strokeStyle = `rgba(178,140,255,${d.opacity})`;
        ctx.lineWidth = d.width;
        ctx.stroke();
        d.y += d.speed;
        if (d.y > canvas.height) {
          d.y = -d.len;
          d.x = Math.random() * canvas.width;
        }
      });
      requestAnimationFrame(drawRain);
    }

    window.addEventListener('resize', initRain);
    initRain();
    drawRain();

    // ── Init all eye rain canvases ──
    window.addEventListener('load', () => {
      // Central large watermark — purple rain
      const logoBg = document.getElementById('logo-bg');
      const bgSize = Math.min(window.innerWidth * 0.70, window.innerHeight * 0.70);
      createEyeRain(logoBg, '155,114,240', Math.round(bgSize));

      // Scattered canvases — read data-color attribute
      document.querySelectorAll('canvas.eye-scatter').forEach(c => {
        const rgb = c.dataset.color || '155,114,240';
        const px  = Math.round(parseFloat(c.style.width) || 100);
        createEyeRain(c, rgb, px);
      });
    });

    // Expose createEyeRain so React components can use it
    window.createEyeRain = createEyeRain;
  </script>

    /* ────────────────────────────────────────────
       HERO
    ──────────────────────────────────────────── */
    function Hero() {
      const c1Ref = React.useRef(null);
      const c2Ref = React.useRef(null);
      const eyeRef = React.useRef(null);
      React.useEffect(() => {
        if (eyeRef.current && window.createEyeRain) {
          createEyeRain(eyeRef.current, '155,114,240', 600);
        }
      }, []);
      React.useEffect(() => {
        function animCounter(el, target, suffix, dur) {
          let s = null;
          const step = ts => {
            if (!s) s = ts;
            const p = Math.min((ts-s)/dur, 1);
            const e = 1 - Math.pow(1-p, 3);
            el.textContent = Math.floor(e*target)+suffix;
            if (p<1) requestAnimationFrame(step);
          };
          requestAnimationFrame(step);
        }
        const t = setTimeout(() => {
          if (c1Ref.current) animCounter(c1Ref.current, 20, 'h', 1600);
          if (c2Ref.current) animCounter(c2Ref.current, 80, '%', 1800);
        }, 400);
        return () => clearTimeout(t);
      }, []);

      return (
        <section id="hero" style={{ minHeight:'100vh', paddingTop:100, display:'flex', alignItems:'center', position:'relative', overflow:'hidden' }}>
          {/* Purple eye rain — hero section */}
          <canvas ref={eyeRef} style={{ position:'absolute', right:'-5%', top:'50%', transform:'translateY(-50%)', width:'52%', maxWidth:560, aspectRatio:'1/1', opacity:0.10, pointerEvents:'none', zIndex:0 }}></canvas>
          {/* Single subtle accent blob */}
          <div style={{ position:'absolute', width:500, height:500, borderRadius:'50%', pointerEvents:'none', background:'radial-gradient(circle, rgba(155,114,240,0.12) 0%, transparent 70%)', filter:'blur(100px)', top:-100, left:-150, animation:'float1 10s ease-in-out infinite' }}/>

            <div style={{ maxWidth:720 }}>
              {/* Badge */}

                <span style={{ width:5, height:5, background:'#c9a84c', borderRadius:'50%', display:'inline-block', animation:'pulse-dim 2s ease-in-out infinite' }}/>
                Automatización con IA para negocios colombianos
              </div>

              <h1 style={{ fontFamily:"'Playfair Display',serif", fontSize:'clamp(38px,5.5vw,68px)', lineHeight:1.1, fontWeight:700, marginBottom:22, letterSpacing:'-0.5px', color:'#e8e6f0' }}>
                Tu negocio trabaja<br/>
                <span style={{ color:'#9b72f0' }}>sin parar.</span><br/>
                Tú decides cuándo.
              </h1>

              <p style={{ fontSize:'clamp(15px,1.8vw,18px)', color:'#7a788f', maxWidth:560, lineHeight:1.75, marginBottom:40 }}>
                Automatizamos los procesos repetitivos de tu negocio con agentes de IA —
                atención al cliente, seguimiento de ventas, gestión de inventario —
                por WhatsApp o web,{' '}
                <strong style={{ color:'#b0aec8', fontWeight:500 }}>sin que tengas que cambiar cómo trabajas.</strong>
              </p>

              <div style={{ display:'flex', flexWrap:'wrap', alignItems:'center', gap:14 }}>
                <BtnPrimary href="#contacto">
                  Quiero automatizar mi negocio
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </BtnPrimary>
                <BtnGhost href="#servicios">Ver servicios</BtnGhost>
              </div>

              {/* Stats */}
              <div style={{ display:'flex', flexWrap:'wrap', gap:36, marginTop:52, paddingTop:36, borderTop:'1px solid rgba(155,114,240,0.12)' }}>
                {[
                  { ref:c1Ref, val:'0h',  label:'ahorradas por semana en promedio' },
                  { ref:c2Ref, val:'0%',  label:'reducción de tareas manuales' },
                  { ref:null,  val:'24/7',label:'tu negocio disponible siempre' },
                ].map(({ref,val,label}) => (
                  <div key={label}>
                    <div style={{ fontFamily:"'Playfair Display',serif", fontSize:34, fontWeight:700, lineHeight:1, color:'#9b72f0' }}>
                      {ref ? <span ref={ref}>{val}</span> : val}
                    </div>
                    <div style={{ fontSize:12, color:'#7a788f', marginTop:4, maxWidth:120 }}>{label}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

    function BtnPrimary({href, children}) {
      const [h, setH] = React.useState(false);
      return (
        <a href={href} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
           style={{ display:'inline-flex', alignItems:'center', gap:8, background: h ? 'rgba(155,114,240,0.22)' : 'rgba(155,114,240,0.14)', color:'#c4b0ff', fontSize:14, fontWeight:600, padding:'14px 28px', borderRadius:8, textDecoration:'none', border:'1px solid rgba(155,114,240,0.30)', transition:'all 0.2s' }}>
          {children}
        </a>
      );
    }

    function BtnGhost({href, children}) {
      const [h, setH] = React.useState(false);

                <div style={{ marginTop:32, padding:'16px 20px', background:'rgba(155,114,240,0.06)', border:'1px solid rgba(155,114,240,0.12)', borderRadius:12 }}>
                  <div style={{ fontSize:12, color:'#5a5870', marginBottom:8, fontWeight:600, letterSpacing:0.5 }}>¿Por qué 3 preguntas?</div>
                  <div style={{ fontSize:13, color:'#7a788f', lineHeight:1.7 }}>Para no hacerte perder el tiempo con formularios largos. Con esto ya sabemos cómo ayudarte.</div>
                </div>
              </div>

              {/* Right: wizard */}
              <div style={{ background:'#0d0d18', border:'1px solid rgba(155,114,240,0.14)', borderRadius:22, padding:'32px 30px' }}>
                {/* Progress */}
                <div style={{ display:'flex', alignItems:'center', justifyContent:'center', marginBottom:28, gap:0 }}>
                  {[1,2,3].map(n => <StepDot key={n} n={n}/>)}
                </div>

                {/* STEP 1 — Service selection */}
                {step===1 && (
                  <div key="s1" style={{ animation:'fadeUp 0.25s ease' }}>
                    <div style={{ fontSize:16, fontWeight:700, color:'#e8e6f0', marginBottom:6 }}>¿Qué quieres automatizar?</div>
                    <div style={{ fontSize:13, color:'#7a788f', marginBottom:20 }}>Elige el que más se acerque a tu necesidad.</div>
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
                      {SERVICES_OPTS.map(s => (
                        <div key={s.id} onClick={()=>{ setService(s.id); setTimeout(()=>setStep(2),200); }}
                          style={{ padding:'14px 14px', borderRadius:12, cursor:'pointer', transition:'all 0.2s',
                            background: service===s.id ? 'rgba(155,114,240,0.14)' : 'rgba(255,255,255,0.03)',
                            border: `1px solid ${service===s.id ? 'rgba(155,114,240,0.40)' : 'rgba(255,255,255,0.07)'}`,
                            transform: service===s.id ? 'scale(1.02)' : 'scale(1)' }}
                          onMouseEnter={e=>{ if(service!==s.id){ e.currentTarget.style.background='rgba(155,114,240,0.07)'; e.currentTarget.style.borderColor='rgba(155,114,240,0.22)'; }}}
                          onMouseLeave={e=>{ if(service!==s.id){ e.currentTarget.style.background='rgba(255,255,255,0.03)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.07)'; }}}>
                          <div style={{ fontSize:20, marginBottom:6 }}>{s.icon}</div>
                          <div style={{ fontSize:13, fontWeight:600, color:'#d8d6e8', marginBottom:3 }}>{s.label}</div>
                          <div style={{ fontSize:11, color:'#5a5870' }}>{s.desc}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* STEP 2 — Company size */}
                {step===2 && (
                  <div key="s2" style={{ animation:'fadeUp 0.25s ease' }}>
                    <div style={{ fontSize:16, fontWeight:700, color:'#e8e6f0', marginBottom:6 }}>¿Cuántas personas trabajan en tu negocio?</div>
                    <div style={{ fontSize:13, color:'#7a788f', marginBottom:24 }}>Esto nos ayuda a dimensionar la solución correcta.</div>
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:24 }}>
                      {EMPS.map(e => (
                        <div key={e} onClick={()=>setEmployees(e)}
                          style={{ padding:'18px 14px', borderRadius:12, cursor:'pointer', textAlign:'center', transition:'all 0.2s',
                            background: employees===e ? 'rgba(155,114,240,0.14)' : 'rgba(255,255,255,0.03)',
                            border: `1px solid ${employees===e ? 'rgba(155,114,240,0.40)' : 'rgba(255,255,255,0.07)'}` }}
                          onMouseEnter={ev=>{ if(employees!==e){ ev.currentTarget.style.background='rgba(155,114,240,0.07)'; ev.currentTarget.style.borderColor='rgba(155,114,240,0.22)'; }}}
                          onMouseLeave={ev=>{ if(employees!==e){ ev.currentTarget.style.background='rgba(255,255,255,0.03)'; ev.currentTarget.style.borderColor='rgba(255,255,255,0.07)'; }}}>
                          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:22, fontWeight:700, color: employees===e ? '#9b72f0' : '#c8c6d8', marginBottom:4 }}>{e}</div>
                          <div style={{ fontSize:11, color:'#5a5870' }}>personas</div>
                        </div>
                      ))}
                    </div>
                    <div style={{ display:'flex', gap:10 }}>
                      <button onClick={()=>setStep(1)} style={{ flex:1, background:'rgba(255,255,255,0.04)', color:'#7a788f', border:'1px solid rgba(255,255,255,0.07)', borderRadius:8, padding:'12px', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'Inter,sans-serif' }}>← Atrás</button>
                      <button onClick={()=>employees && setStep(3)} style={{ flex:2, background: employees ? 'rgba(155,114,240,0.18)' : 'rgba(155,114,240,0.06)', color: employees ? '#c4b0ff' : '#3e3c52', border:`1px solid ${employees ? 'rgba(155,114,240,0.35)' : 'rgba(255,255,255,0.05)'}`, borderRadius:8, padding:'12px', fontSize:13, fontWeight:700, cursor: employees ? 'pointer' : 'default', fontFamily:'Inter,sans-serif', transition:'all 0.2s' }}>
                        Continuar →
                      </button>
                    </div>
                  </div>
                )}

                {/* STEP 3 — Contact info */}
                {step===3 && (
                  <div key="s3" style={{ animation:'fadeUp 0.25s ease' }}>
                    <div style={{ fontSize:16, fontWeight:700, color:'#e8e6f0', marginBottom:6 }}>¿Cómo te contactamos?</div>
                    <div style={{ fontSize:13, color:'#7a788f', marginBottom:20 }}>Te escribimos por WhatsApp en menos de 24 horas.</div>
                    <div style={{ marginBottom:14 }}>
                      <label style={{ display:'block', fontSize:12, fontWeight:600, color:'#7a788f', marginBottom:7 }}>Nombre *</label>
                      <input value={name} onChange={e=>setName(e.target.value)} placeholder="¿Cómo te llamas?"
                        style={{ width:'100%', background:'rgba(255,255,255,0.03)', border:'1px solid rgba(155,114,240,0.14)', borderRadius:8, padding:'12px 14px', fontFamily:'Inter,sans-serif', fontSize:13, color:'#e8e6f0', outline:'none' }}/>
                    </div>
                    <div style={{ marginBottom:24 }}>
                      <label style={{ display:'block', fontSize:12, fontWeight:600, color:'#7a788f', marginBottom:7 }}>WhatsApp *</label>
                      <input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+57 300 000 0000"
                        style={{ width:'100%', background:'rgba(255,255,255,0.03)', border:'1px solid rgba(155,114,240,0.14)', borderRadius:8, padding:'12px 14px', fontFamily:'Inter,sans-serif', fontSize:13, color:'#e8e6f0', outline:'none' }}/>
                    </div>
                    <div style={{ display:'flex', gap:10 }}>
                      <button onClick={()=>setStep(2)} style={{ flex:1, background:'rgba(255,255,255,0.04)', color:'#7a788f', border:'1px solid rgba(255,255,255,0.07)', borderRadius:8, padding:'12px', fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'Inter,sans-serif' }}>← Atrás</button>
                      <button onClick={()=>{ if(name&&phone) setDone(true); }}
                        style={{ flex:2, background: name&&phone ? 'rgba(155,114,240,0.20)' : 'rgba(155,114,240,0.06)', color: name&&phone ? '#d4c6ff' : '#3e3c52', border:`1px solid ${name&&phone ? 'rgba(155,114,240,0.40)' : 'rgba(255,255,255,0.05)'}`, borderRadius:8, padding:'12px', fontSize:13, fontWeight:700, cursor: name&&phone ? 'pointer' : 'default', fontFamily:'Inter,sans-serif', transition:'all 0.2s' }}>
                        Quiero mi diagnóstico gratuito →
                      </button>
                    </div>
                    <div style={{ textAlign:'center', fontSize:11, color:'#3e3c52', marginTop:12 }}>Sin costo · Sin compromiso · 20 minutos</div>
                  </div>
                )}
              </div>
            </div>
          </div>
          <style>{`
            @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
          `}</style>
        </section>
      );
    }

    /* ────────────────────────────────────────────
       FOOTER
    ──────────────────────────────────────────── */
    function Footer() {
      return (
        <footer style={{ background:'#07070e', borderTop:'1px solid rgba(155,114,240,0.10)', padding:'36px 0' }}>
          <div style={{ maxWidth:1160, margin:'0 auto', padding:'0 24px', display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:16 }}>
            <div>
              <div style={{ fontFamily:'Georgia,serif', fontSize:16, fontWeight:700, letterSpacing:'0.14em', marginBottom:6 }}>
                <span style={{color:'#94A3B8'}}>I</span><span style={{color:'#e8e6f0'}}>Arcan</span><span style={{color:'#94A3B8'}}>IA</span>
              </div>
              <p style={{ fontSize:13, color:'#3e3c52' }}>© 2026 IArcanIA. Automatización con IA para Colombia.</p>
            </div>
            <div style={{ display:'flex', gap:22 }}>
              {['Servicios','Nosotros','Contacto'].map(l=>(
                <a key={l} href="#" style={{ fontSize:13, color:'#3e3c52', textDecoration:'none', transition:'color 0.2s' }}
                   onMouseEnter={e=>e.target.style.color='#c9a84c'}
                   onMouseLeave={e=>e.target.style.color='#3e3c52'}>{l}</a>
              ))}
            </div>
          </div>
        </footer>
      );
    }

    /* ────────────────────────────────────────────
       APP
    ──────────────────────────────────────────── */
    function App() {
      return (
        <main>
          <Navbar/>
          <Hero/>
          <Services/>
          <HowItWorks/>
          <WhyUs/>
          <Fundadores/>
          <Contact/>
          <Footer/>
          <a href="https://wa.me/573236688646" target="_blank" rel="noopener" className="whatsapp-fab" title="Escríbenos por WhatsApp">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="#fff">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
              <path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.118 1.532 5.845L.054 23.893a.5.5 0 0 0 .609.61l6.102-1.467A11.937 11.937 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.883a9.879 9.879 0 0 1-5.031-1.377l-.36-.214-3.733.897.933-3.658-.235-.375A9.9 9.9 0 0 1 2.117 12C2.117 6.53 6.53 2.117 12 2.117S21.883 6.53 21.883 12 17.47 21.883 12 21.883z"/>
            </svg>
          </a>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
