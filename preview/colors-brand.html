<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07070e; font-family: 'Inter', sans-serif; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .title { font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #c9a84c; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .title::before { content:''; display:block; width:14px; height:1px; background:#c9a84c; }
  .row { display: flex; gap: 10px; }
  .swatch { flex: 1; border-radius: 10px; overflow: hidden; }
  .block { height: 64px; }
  .info { padding: 9px 11px; background: #10101a; border: 1px solid rgba(100,70,200,0.10); border-top: none; border-radius: 0 0 10px 10px; }
  .name { font-size: 11px; font-weight: 600; color: #e8e6f0; }
  .hex  { font-size: 10px; color: #7a788f; font-family: monospace; margin-top: 2px; }
  .use  { font-size: 9px; color: #3e3c52; margin-top: 3px; }
</style></head><body>

<div class="title">Purple — color primario de acción</div>
<div class="row">
  <div class="swatch">
    <div class="block" style="background:#3d1f8f; border-radius:10px 10px 0 0;"></div>
    <div class="info"><div class="name">purple-darker</div><div class="hex">#3d1f8f</div><div class="use">Tono más oscuro / variante profunda</div></div>
  </div>
  <div class="swatch">
    <div class="block" style="background:#5a2de0; border-radius:10px 10px 0 0;"></div>
    <div class="info"><div class="name">purple-deep</div><div class="hex">#5a2de0</div><div class="use">Color primario de acción</div></div>
  </div>
  <div class="swatch">
    <div class="block" style="background:#7b5ce0; border-radius:10px 10px 0 0;"></div>
    <div class="info"><div class="name">purple-mid</div><div class="hex">#7b5ce0</div><div class="use">Hover de bordes, gradiente CTA</div></div>
  </div>
  <div class="swatch">
    <div class="block" style="background:#9b72f0; border-radius:10px 10px 0 0;"></div>
    <div class="info"><div class="name">purple-light</div><div class="hex">#9b72f0</div><div class="use">Texto acento, tags</div></div>
  </div>
</div>

<!-- Gradient ramp -->
<div style="height:5px; border-radius:100px; background:linear-gradient(90deg,#3d1f8f,#5a2de0,#7b5ce0,#9b72f0);"></div>

<!-- Usage in context -->
<div style="background:#10101a; border:1px solid rgba(90,45,224,0.18); border-radius:10px; padding:14px 16px;">
  <div style="font-size:9px; color:#7a788f; letter-spacing:1px; text-transform:uppercase; margin-bottom:10px;">En uso</div>
  <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
    <!-- CTA button -->
    <div style="background:linear-gradient(135deg,#3d1f8f,#7b5ce0); color:#fff; font-size:13px; font-weight:600; padding:10px 20px; border-radius:8px; box-shadow:0 0 20px rgba(90,45,224,0.35); font-family:Inter,sans-serif;">CTA primario</div>
    <!-- Border -->
    <div style="border:1px solid rgba(90,45,224,0.25); border-radius:8px; padding:10px 16px; font-size:13px; color:#9b72f0; font-family:Inter,sans-serif;">Ghost</div>
    <!-- Tag -->
    <span style="font-size:11px; font-weight:600; padding:3px 10px; border-radius:100px; background:rgba(90,45,224,0.12); border:1px solid rgba(90,45,224,0.22); color:#9b72f0; font-family:Inter,sans-serif;">Tag</span>
    <!-- Stat -->
    <div style="font-family:'Playfair Display',serif; font-size:28px; font-weight:700; color:#7b5ce0;">92%</div>
  </div>
</div>

</body></html>
