<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #090910; font-family: 'Inter', sans-serif; padding: 24px; display: flex; flex-direction: column; gap: 16px; align-items: flex-start; }
  .label { font-size: 10px; color: #5a5870; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  .rule { font-size: 11px; color: #9896b0; line-height: 1.6; }
  .rule strong { color: #d4af37; }
</style></head><body>

<!-- Full logo lockup -->
<div>
  <div class="label">Logo — El Ojo Arcano</div>
  <div style="display:flex; align-items:center; gap:16px; padding: 20px 28px; background:#13131f; border-radius:12px; border:1px solid rgba(168,85,247,0.12);">
    <svg width="56" height="56" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
      <path d="M36 14 Q58 36 36 58 Q14 36 36 14 Z" fill="none" stroke="#F1F0F7" stroke-width="1.5"/>
      <circle cx="36" cy="36" r="14" fill="none" stroke="#94A3B8" stroke-width="0.75"/>
      <g stroke="#CBD5E1" stroke-width="1" opacity="0.7">
        <line x1="36" y1="24" x2="36" y2="20"/><line x1="36" y1="48" x2="36" y2="52"/>
        <line x1="24" y1="36" x2="20" y2="36"/><line x1="48" y1="36" x2="52" y2="36"/>
        <line x1="27.9" y1="27.9" x2="25.1" y2="25.1"/><line x1="44.1" y1="44.1" x2="46.9" y2="46.9"/>
        <line x1="44.1" y1="27.9" x2="46.9" y2="25.1"/><line x1="27.9" y1="44.1" x2="25.1" y2="46.9"/>
      </g>
      <circle cx="36" cy="36" r="6" fill="#F1F0F7"/>
      <circle cx="36" cy="36" r="2.5" fill="#090910"/>
      <g stroke="#475569" stroke-width="1" stroke-linecap="round">
        <line x1="36" y1="14" x2="36" y2="10"/><line x1="36" y1="58" x2="36" y2="62"/>
        <line x1="14" y1="36" x2="10" y2="36"/><line x1="58" y1="36" x2="62" y2="36"/>
      </g>
    </svg>
    <div>
      <div style="font-family:Georgia,serif; font-size:22px; font-weight:700; letter-spacing:0.15em;">
        <span style="color:#94A3B8;">I</span><span style="color:#F1F0F7;">Arcan</span><span style="color:#94A3B8;">IA</span>
      </div>
      <div style="font-size:11px; color:#5a5870; margin-top:4px; letter-spacing:0.5px;">Automatización con IA</div>
    </div>
  </div>
</div>

<!-- Small size -->
<div>
  <div class="label">Minimum size — 20px icon</div>
  <div style="display:flex; align-items:center; gap:8px; padding:12px 16px; background:#13131f; border-radius:8px; border:1px solid rgba(168,85,247,0.12);">
    <svg width="20" height="20" viewBox="0 0 72 72">
      <path d="M36 14 Q58 36 36 58 Q14 36 36 14 Z" fill="none" stroke="#F1F0F7" stroke-width="1.5"/>
      <circle cx="36" cy="36" r="14" fill="none" stroke="#94A3B8" stroke-width="0.75"/>
      <circle cx="36" cy="36" r="6" fill="#F1F0F7"/>
      <circle cx="36" cy="36" r="2.5" fill="#090910"/>
    </svg>
    <span style="font-family:Georgia,serif; font-size:14px; font-weight:700; letter-spacing:0.12em;">
      <span style="color:#94A3B8;">I</span><span style="color:#F1F0F7;">Arcan</span><span style="color:#94A3B8;">IA</span>
    </span>
  </div>
</div>

<!-- Usage rules -->
<div style="padding:14px 16px; background:#13131f; border-radius:10px; border:1px solid rgba(168,85,247,0.12); max-width:420px;">
  <div class="label">Usage Rules</div>
  <div class="rule">
    <strong>Always on dark background</strong> — never on white or light.<br/>
    <strong>Minimum size:</strong> 20px (pupil must be visible).<br/>
    <strong>Wordmark always to the right</strong> — never below.<br/>
    Do not rotate, apply color filters, or change opacities.
  </div>
</div>

</body></html>
