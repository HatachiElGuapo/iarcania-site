<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07070e; font-family: 'Inter', sans-serif; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; gap: 10px; }
  .swatch { flex: 1; border-radius: 10px; overflow: hidden; }
  .block { height: 72px; position: relative; }
  .info { padding: 10px 12px; background: #0f0f1a; border: 1px solid rgba(155,114,240,0.10); border-top: none; border-radius: 0 0 10px 10px; }
  .name { font-size: 11px; font-weight: 600; color: #e8e6f0; }
  .hex  { font-size: 10px; color: #7a788f; margin-top: 2px; font-family: monospace; }
  .use  { font-size: 10px; color: #3e3c52; margin-top: 3px; }
  .title { font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #c9a84c; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .title::before { content:''; display:block; width:14px; height:1px; background:#c9a84c; }
</style></head><body>

<div class="title">Fondos — de más oscuro a más claro</div>

<div class="row">
  <div class="swatch">
    <div class="block" style="background:#07070e; border-radius:10px 10px 0 0; border:1px solid rgba(255,255,255,0.04); border-bottom:none;">
      <div style="position:absolute; bottom:8px; right:10px; font-size:9px; color:rgba(255,255,255,0.18); font-family:monospace;">root</div>
    </div>
    <div class="info"><div class="name">bg-deep</div><div class="hex">#07070e</div><div class="use">Fondo raíz — siempre presente</div></div>
  </div>
  <div class="swatch">
    <div class="block" style="background:#0b0b14; border-radius:10px 10px 0 0;">
      <div style="position:absolute; bottom:8px; right:10px; font-size:9px; color:rgba(255,255,255,0.18); font-family:monospace;">alt</div>
    </div>
    <div class="info"><div class="name">bg-dark</div><div class="hex">#0b0b14</div><div class="use">Secciones alternas</div></div>
  </div>
  <div class="swatch">
    <div class="block" style="background:#10101a; border-radius:10px 10px 0 0;">
      <div style="position:absolute; bottom:8px; right:10px; font-size:9px; color:rgba(255,255,255,0.18); font-family:monospace;">card</div>
    </div>
    <div class="info"><div class="name">bg-card</div><div class="hex">#10101a</div><div class="use">Cards y contenedores</div></div>
  </div>
  <div class="swatch">
    <div class="block" style="background:#14142200; background-color:#141422; border-radius:10px 10px 0 0;">
      <div style="position:absolute; bottom:8px; right:10px; font-size:9px; color:rgba(255,255,255,0.18); font-family:monospace;">modal</div>
    </div>
    <div class="info"><div class="name">bg-card-2</div><div class="hex">#141422</div><div class="use">Cabeceras de modal, capas internas</div></div>
  </div>
</div>

<!-- Gradient ramp to show progression -->
<div style="height:6px; border-radius:100px; background:linear-gradient(90deg, #07070e, #0b0b14, #10101a, #141422); opacity:0.9;"></div>
<div style="display:flex; justify-content:space-between; padding:0 2px;">
  <span style="font-size:9px; color:#3e3c52;">más oscuro</span>
  <span style="font-size:9px; color:#3e3c52;">más claro</span>
</div>

</body></html>
